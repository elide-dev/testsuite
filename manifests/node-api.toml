# Node.js core JavaScript API coverage. Paths are relative to the Node.js checkout.
#
# The adapter expands these globs against the sparse Node checkout. Groups are
# broad public API surfaces first; many are expected to fail initially but give
# reports enough shape to classify Node compatibility.

[[group]]
id = "assert"
include = [
  "test/parallel/test-assert*.js",
]
tags = ["node", "api", "assert"]

[[group]]
id = "async-hooks"
include = [
  "test/parallel/test-async-hooks*.js",
  "test/parallel/test-async-local*.js",
]
tags = ["node", "api", "async_hooks"]

