# Broad javac langtools subset. Paths are relative to OpenJDK test/langtools.
#
# Keep annotation processing and modules out of the default suite for now:
# - tools/javac/processing depends on annotation processing behavior not expected to work yet.
# - tools/javac/modules is outside the current embedded compiler compliance target.

[[group]]
id = "javac-diagnostics"
include = [
  "tools/javac/diags",
  "tools/javac/Diagnostics",
  "tools/javac/rawDiags",
]
tags = ["javac", "diagnostics"]

