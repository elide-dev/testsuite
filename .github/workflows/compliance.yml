name: compliance
on:
  workflow_dispatch:
    inputs:
      elide_ref:
        description: "Elide image tag, digest (ghcr.io/...@sha256:...), or 'nightly'"
        default: "nightly"
      suite:
        description: "Workload id"
        default: "test262"
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC

permissions:
  contents: write

jobs:
  run:
    runs-on: [self-hosted, linux]
    # Inputs are passed via env (never interpolated into run: directly) to avoid
    # workflow command injection.
    env:
      ELIDE_REF: ${{ inputs.elide_ref || 'nightly' }}
      SUITE: ${{ inputs.suite || 'test262' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
      - name: Initialize requested suite
        shell: bash
        run: |
          set -euo pipefail
          case "$SUITE" in
            test262)
              git submodule update --init --depth 1 --recommend-shallow suites/test262
              ;;
            wpt-wintertc)
              ./bin/init-wpt
              ;;
            cpython-core)
              git submodule update --init --depth 1 --recommend-shallow suites/cpython
              ;;
            javac-jtreg)
              git submodule update --init --depth 1 --recommend-shallow --filter=blob:none suites/openjdk
              git -C suites/openjdk sparse-checkout init --cone
              git -C suites/openjdk sparse-checkout set test/langtools/tools/javac
              ;;
            *)
              echo "unknown suite: $SUITE" >&2
              exit 2
              ;;
          esac
      - name: Run suite
        run: ./bin/run --elide "$ELIDE_REF" --suite "$SUITE"
        env:
          THREADS: "8"
      - name: Upload full results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: reports/**/results.json.gz
      - name: Commit reports
        if: always()
        run: |
          git config user.name "elide-ci"
          git config user.email "ci@elide.dev"
          git add reports
          git commit -m "ci: compliance report ${ELIDE_REF}" || { echo "no changes to commit"; exit 0; }
          branch="$(git rev-parse --abbrev-ref HEAD)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "$branch" && git push origin "$branch"; then
              exit 0
            fi
            echo "push attempt $i failed; retrying in 5s"; sleep 5
          done
          echo "push failed after 5 attempts" >&2; exit 1

  pages:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports
      - uses: actions/deploy-pages@v4
