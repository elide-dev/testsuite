name: "Check - Compliance"

"on":
  workflow_call:
    inputs:
      runner:
        description: "Runner"
        required: false
        default: '["self-hosted","linux"]'
        type: string
      elide_ref:
        description: "Elide Ref"
        required: false
        default: "nightly"
        type: string
      elide_tarball_url:
        description: "Elide Tarball"
        required: false
        default: ""
        type: string
      suite_test262:
        description: "Test262"
        required: false
        default: true
        type: boolean
      suite_wpt_wintertc:
        description: "WinterTC"
        required: false
        default: true
        type: boolean
      suite_cpython_core:
        description: "CPython"
        required: false
        default: true
        type: boolean
      suite_javac_jtreg:
        description: "javac jtreg"
        required: false
        default: true
        type: boolean
      include:
        description: "Include"
        required: false
        default: ""
        type: string
      update_branch:
        description: "Update Branch"
        required: false
        default: "sync/compliance"
        type: string
      options:
        description: "Options"
        required: false
        default: "{}"
        type: string
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner"
        required: false
        default: '["self-hosted","linux"]'
        type: string
      elide_ref:
        description: "Elide Ref"
        required: false
        default: "nightly"
        type: string
      elide_tarball_url:
        description: "Elide Tarball"
        required: false
        default: ""
        type: string
      suite_test262:
        description: "Test262"
        required: false
        default: true
        type: boolean
      suite_wpt_wintertc:
        description: "WinterTC"
        required: false
        default: true
        type: boolean
      suite_cpython_core:
        description: "CPython"
        required: false
        default: true
        type: boolean
      suite_javac_jtreg:
        description: "javac jtreg"
        required: false
        default: true
        type: boolean
      include:
        description: "Include"
        required: false
        default: ""
        type: string
      log:
        description: "Log"
        required: false
        default: true
        type: boolean
      ratchet:
        description: "Ratchet"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CI: "true"

jobs:
  compliance:
    name: "Compliance"
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 720
    env:
      ELIDE_REF: ${{ inputs.elide_ref }}
      ELIDE_TARBALL_URL: ${{ inputs.elide_tarball_url }}
      INCLUDE: ${{ inputs.include }}
      UPDATE_BRANCH: ${{ inputs.update_branch || 'sync/compliance' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: "Setup: Harden Runner"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: "Setup: Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
          clean: true
          persist-credentials: true

      - name: "Setup: Bun"
        uses: step-security/setup-bun@f6f5dadeac34f70c7828f731569e8d6e8330b8fb # v2.1.3
        with:
          bun-version: "1.3.14"

      - name: "Setup: Bun Cache"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bun-install-cache"
          echo "BUN_INSTALL_CACHE_DIR=$RUNNER_TEMP/bun-install-cache" >> "$GITHUB_ENV"

      - name: "Setup: Resolve Options"
        id: options
        shell: bash
        env:
          OPTIONS_JSON: ${{ inputs.options || '{}' }}
          DIRECT_LOG: ${{ inputs.log }}
          DIRECT_RATCHET: ${{ inputs.ratchet }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/resolve-options.mjs" <<'JS'
            const raw = process.env.OPTIONS_JSON || "{}";
            let options = {};
            try {
              options = JSON.parse(raw);
            } catch (err) {
              console.error(`Invalid options JSON: ${err instanceof Error ? err.message : String(err)}`);
              process.exit(2);
            }
            const directBool = (name) => {
              const value = process.env[name];
              return value === "" || value == null ? undefined : value === "true";
            };
            const resolved = {
              threads: String(options.threads ?? ""),
              suite_workers: String(options.suite_workers ?? ""),
              concurrency_multiplier: String(options.concurrency_multiplier ?? "2"),
              log: Boolean(directBool("DIRECT_LOG") ?? options.log ?? true),
              failure_output: String(options.failure_output ?? "hide"),
              ratchet: Boolean(directBool("DIRECT_RATCHET") ?? options.ratchet ?? false),
              update_summaries: Boolean(options.update_summaries ?? false),
              apply_updates: Boolean(options.apply_updates ?? false),
              create_pr: Boolean(options.create_pr ?? true),
            };
            const out = Object.entries(resolved)
              .map(([key, value]) => `${key}=${typeof value === "boolean" ? String(value) : value}`)
              .join("\n") + "\n";
            await Bun.write(process.env.GITHUB_OUTPUT, out, { append: true });
          JS
          bun "$RUNNER_TEMP/resolve-options.mjs"

      - name: "Setup: Select Suites"
        id: suites
        shell: bash
        env:
          SUITE_TEST262: ${{ inputs.suite_test262 }}
          SUITE_WPT_WINTERTC: ${{ inputs.suite_wpt_wintertc }}
          SUITE_CPYTHON_CORE: ${{ inputs.suite_cpython_core }}
          SUITE_JAVAC_JTREG: ${{ inputs.suite_javac_jtreg }}
        run: |
          set -euo pipefail
          suites=()
          [[ "$SUITE_TEST262" == "true" ]] && suites+=(test262)
          [[ "$SUITE_WPT_WINTERTC" == "true" ]] && suites+=(wpt-wintertc)
          [[ "$SUITE_CPYTHON_CORE" == "true" ]] && suites+=(cpython-core)
          [[ "$SUITE_JAVAC_JTREG" == "true" ]] && suites+=(javac-jtreg)
          if [[ "${#suites[@]}" -eq 0 ]]; then
            echo "No suites selected." >&2
            exit 2
          fi
          csv="$(IFS=,; echo "${suites[*]}")"
          echo "csv=$csv" >> "$GITHUB_OUTPUT"
          echo "Selected suites: $csv"

      - name: "Setup: Suite Submodules"
        env:
          SELECTED_SUITES: ${{ steps.suites.outputs.csv }}
        run: bun run setup:suites --suite "$SELECTED_SUITES"

      - name: "Setup: Elide Tarball"
        id: elide
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$ELIDE_TARBALL_URL" ]]; then
            echo "target=$ELIDE_REF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/elide-download" "$RUNNER_TEMP/elide-install"
          archive="$RUNNER_TEMP/elide-download/elide.tar"
          curl -fsSL "$ELIDE_TARBALL_URL" -o "$archive"
          tar -xf "$archive" -C "$RUNNER_TEMP/elide-install"
          elide_bin="$(find "$RUNNER_TEMP/elide-install" -path '*/bin/elide' -type f | head -n 1)"
          if [[ -z "$elide_bin" ]]; then
            echo "No bin/elide found in tarball: $ELIDE_TARBALL_URL" >&2
            exit 2
          fi
          chmod +x "$elide_bin"
          target="$(cd "$(dirname "$elide_bin")/.." && pwd)"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: "Run: Compliance Suites"
        shell: bash
        env:
          ELIDE_TARGET: ${{ steps.elide.outputs.target }}
          SELECTED_SUITES: ${{ steps.suites.outputs.csv }}
          THREADS: ${{ steps.options.outputs.threads }}
          SUITE_WORKERS: ${{ steps.options.outputs.suite_workers }}
          CONCURRENCY_MULTIPLIER: ${{ steps.options.outputs.concurrency_multiplier }}
          FAILURE_OUTPUT: ${{ steps.options.outputs.failure_output }}
        run: |
          set -euo pipefail
          args=(
            bun run testsuite:ready
            --elide "$ELIDE_TARGET"
            --suite "$SELECTED_SUITES"
            --concurrency-multiplier "$CONCURRENCY_MULTIPLIER"
            --failure-output "$FAILURE_OUTPUT"
          )
          [[ "${{ steps.options.outputs.log }}" == "true" ]] && args+=(--log)
          [[ "${{ steps.options.outputs.ratchet }}" == "true" ]] && args+=(--ratchet)
          [[ "${{ steps.options.outputs.update_summaries }}" == "true" ]] && args+=(--update-summaries)
          [[ -n "$INCLUDE" ]] && args+=(--include "$INCLUDE")
          [[ -n "$THREADS" ]] && args+=(--threads "$THREADS")
          [[ -n "$SUITE_WORKERS" ]] && args+=(--suite-workers "$SUITE_WORKERS")
          "${args[@]}"

      - name: "Upload: Reports"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compliance-reports
          path: |
            reports/**
            expectations/*.ratchet.toml
            README.md
          if-no-files-found: ignore

      - name: "Update: Commit Generated Reports"
        if: ${{ always() && steps.options.outputs.apply_updates == 'true' }}
        id: update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "elide-ci"
          git config user.email "ci@elide.dev"
          git add reports expectations/*.ratchet.toml README.md
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes to commit."
            exit 0
          fi

          branch="${UPDATE_BRANCH:-sync/compliance}"
          git checkout -B "$branch"
          git commit -m "ci: update compliance reports"
          git push --force-with-lease origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: "Update: Open Pull Request"
        if: ${{ always() && steps.options.outputs.apply_updates == 'true' && steps.options.outputs.create_pr == 'true' && steps.update.outputs.changed == 'true' }}
        shell: bash
        env:
          BRANCH: ${{ steps.update.outputs.branch }}
        run: |
          set -euo pipefail
          title="ci: update compliance reports"
          body="Automated compliance report update from ${GITHUB_WORKFLOW} run ${GITHUB_RUN_ID}."
          existing="$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // ""')"
          if [[ -n "$existing" ]]; then
            gh pr edit "$existing" --title "$title" --body "$body"
            echo "Updated PR: $existing"
          else
            gh pr create --base "${GITHUB_REF_NAME:-main}" --head "$BRANCH" --title "$title" --body "$body"
          fi
